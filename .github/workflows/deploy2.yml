name: Deploy to shinyapps.io

on:
  push:
    branches: [ main, master ]

jobs:
  shiny-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: false

      - name: Install system dependencies (Required for spatial packages)
        run: |
          sudo apt-get update
          sudo apt-get install -y libgdal-dev libgeos-dev libproj-dev libudunits2-dev

      - name: Install R Packages and Deploy
        env:
          SHINYAPPS_ACCOUNT: ${{ secrets.SHINYAPPS_ACCOUNT }}
          SHINYAPPS_TOKEN: ${{ secrets.SHINYAPPS_TOKEN }}
          SHINYAPPS_SECRET: ${{ secrets.SHINYAPPS_SECRET }}
        run: |
          Rscript -e "
            # Use full URL (no 'CRAN' alias) so rsconnect::writeManifest()
            # records the complete repository URL in the manifest rather than
            # the bare alias string 'CRAN', which Posit Connect cannot resolve.
            options(repos = c('https://packagemanager.posit.co/cran/latest'))

            # Use minimal memory footprint optimization flags for compilation
            install.packages(
              c('rsconnect', 'shiny', 'sf', 'leafem', 'leaflet', 'mapview',
                'janitor', 'sqldf'),
              clean = TRUE,
              INSTALL_opts = c('--no-docs', '--no-html', '--no-multiarch')
            )

            # Install terra (latest available) with the same optimization flags
            install.packages(
              'terra',
              clean = TRUE,
              INSTALL_opts = c('--no-docs', '--no-html', '--no-multiarch')
            )

            rsconnect::setAccountInfo(
              name = Sys.getenv('SHINYAPPS_ACCOUNT'),
              token = Sys.getenv('SHINYAPPS_TOKEN'),
              secret = Sys.getenv('SHINYAPPS_SECRET')
            )

            # Regenerate manifest so all packages (including sqldf) are captured
            # with full repository URLs before deployment.
            rsconnect::writeManifest(appDir = '.')

            rsconnect::deployApp(
              appDir = '.',
              appName = 'StreetsDataSF',
              appMode = 'shiny',
              forceUpdate = TRUE
            )
          "
