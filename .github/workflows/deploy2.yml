name: Deploy to shinyapps.io

on:
  push:
    branches: [ main, master ] # Triggers deploy when pushing to these branches

jobs:
  shiny-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true # Speeds up package installation on Linux
        
      - name: Install dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            any::rsconnect
            any::shiny
            any::sf
            any::leafem
            any::leaflet
            any::mapview
            any::janitor
            any::readr
            any::cpp11
            any::geometries
            any::jsonify
            any::progress
            any::rapidjsonr
            any::sfheaders
                        
      - name: Authorize and Deploy Application
        env:
          SHINYAPPS_ACCOUNT: ${{ secrets.SHINYAPPS_ACCOUNT }}
          SHINYAPPS_TOKEN: ${{ secrets.SHINYAPPS_TOKEN }}
          SHINYAPPS_SECRET: ${{ secrets.SHINYAPPS_SECRET }}
          RSPM: ""
          RENV_CONFIG_REPOS_OVERRIDE: ""
        run: |
          Rscript -e "
          options(repos = c(CRAN = 'https://cran.rstudio.com/'))
            rsconnect::setAccountInfo(
              name = Sys.getenv('SHINYAPPS_ACCOUNT'),
              token = Sys.getenv('SHINYAPPS_TOKEN'),
              secret = Sys.getenv('SHINYAPPS_SECRET')
            )
            rsconnect::deployApp(
              appDir = '.',
              appName = 'StreetsDataSF',
              appMode = 'shiny',
              forceUpdate = TRUE
            )
          "
