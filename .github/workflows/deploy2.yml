name: Deploy to shinyapps.io

on:
  push:
    branches: [ main, master ] # Triggers deploy when pushing to these branches

jobs:
  shiny-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: false # CRITICAL: Forces standard CRAN URLs from the start
          
      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Install system dependencies (Required for spatial packages)
        run: |
          sudo apt-get update
          sudo apt-get install -y libgdal-dev libgeos-dev libproj-dev libudunits2-dev
        
      - name: Install dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            any::rsconnect
            any::shiny
            any::sf
            any::leafem
            any::leaflet
            any::mapview
            any::janitor
            any::readr
            any::cpp11
            any::geometries
            any::jsonify
            any::progress
            any::rapidjsonr
            any::sfheaders
            cran/terra@1.8-10
        env:
          # CRITICAL: Forces pak to explicitly record the full URL in its tracking database
          CRAN: "https://cran.rstudio.com/"'
          
      - name: Authorize and Deploy Application
        env:
          SHINYAPPS_ACCOUNT: ${{ secrets.SHINYAPPS_ACCOUNT }}
          SHINYAPPS_TOKEN: ${{ secrets.SHINYAPPS_TOKEN }}
          SHINYAPPS_SECRET: ${{ secrets.SHINYAPPS_SECRET }}
          RSPM: ""
          RENV_CONFIG_REPOS_OVERRIDE: ""
        run: |
          # Force an completely clean, literal URL repository map into the active R session profile
          echo "options(repos = c(CRAN = 'https://cran.rstudio.com/'))" > .Rprofile
          
          Rscript -e "        
            rsconnect::setAccountInfo(
              name = Sys.getenv('SHINYAPPS_ACCOUNT'),
              token = Sys.getenv('SHINYAPPS_TOKEN'),
              secret = Sys.getenv('SHINYAPPS_SECRET')
            )
            rsconnect::deployApp(
              appDir = '.',
              appName = 'StreetsDataSF',
              appMode = 'shiny',
              #repos = c(CRAN = 'https://cran.rstudio.com/'),
              forceUpdate = TRUE
            )
          "
          
          # #Clean it up after deployment
          # rm .Rprofile
