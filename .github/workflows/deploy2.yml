    - name: Install R Packages and Deploy
      env:
          SHINYAPPS_ACCOUNT: ${{ secrets.SHINYAPPS_ACCOUNT }}
          SHINYAPPS_TOKEN: ${{ secrets.SHINYAPPS_TOKEN }}
          SHINYAPPS_SECRET: ${{ secrets.SHINYAPPS_SECRET }}
        run: |
          Rscript -e "
            options(repos = c(CRAN = 'https://cran.rstudio.com/'))
            
            # Use minimal memory footprint optimization flags for compilation
            install.packages(
              c('rsconnect', 'shiny', 'sf', 'leafem', 'leaflet', 'mapview', 'janitor'), 
              clean = TRUE, 
              INSTALL_opts = c('--no-docs', '--no-html', '--no-multiarch')
            )
            
            # Pin terra with the same optimization flags
            install.packages(
              'https://cran.r-project.org/src/contrib/Archive/terra/terra_1.8-10.tar.gz', 
              repos = NULL, 
              type = 'source',
              clean = TRUE,
              INSTALL_opts = c('--no-docs', '--no-html', '--no-multiarch')
            )
            
            rsconnect::setAccountInfo(
              name = Sys.getenv('SHINYAPPS_ACCOUNT'),
              token = Sys.getenv('SHINYAPPS_TOKEN'),
              secret = Sys.getenv('SHINYAPPS_SECRET')
            )
            
            rsconnect::deployApp(
              appDir = '.',
              appName = 'StreetsDataSF',
              appMode = 'shiny',
              forceUpdate = TRUE
            )
